# Template for contributing a table to the Speaker mesh.
# Copy this directory to contrib/your-table-name/ and fill in.

name: your_table
database: your_database       # e.g. events, patents, funding
tier: contrib
description: "What this table contains."
rows: ?
order_by: [?]

columns:
  # At least one column MUST connect to the mesh:
  entity_id:    { type: String, connects_to: companies.main.entity_id }
  # OR
  # person_id:  { type: String, connects_to: people.main.speaker_person_id }

  # Your columns:
  # name:       { type: String }
  # date:       { type: Date }
  # ...

source:
  origin: "Where the data comes from (must be public)"
  pipeline: "contrib/your-table-name/pipeline.py"
  refresh: monthly
