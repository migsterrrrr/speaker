version: 1
purpose: compact LLM-oriented schema notes for Speaker tables
query_pattern:
  rule: hops, not joins
  recipe:
  - query one table
  - carry the relevant id, domain, or linkedin_id forward
  - hop into the next table using the documented hop_keys
conventions:
  string: scalar string; may still be empty unless noted otherwise
  string?: nullable or frequently empty string
  string[]: real JSON array of strings
  float[]: real JSON array of floats
  date: returned as YYYY-MM-DD
  datetime: returned as YYYY-MM-DD HH:MM:SS
  timestamp: returned as YYYY-MM-DD HH:MM:SS.fffffffff
  pipe_string?: string with | delimiter; not an array
identity_graph:
  person_nucleus:
    canonical: people.main.speaker_person_id
    seen_as:
      people.career: person_id
      people.education: speaker_person_id
      people.contact: speaker_person_id
      people.repos: speaker_person_id
  company_nucleus:
    canonical: companies.main.entity_id
    seen_as:
      people.main: entity_id
      people.career: entity_id
      companies.jobs: entity_id
      companies.news: entity_id
      web.links:
      - source_entity_id
      - target_entity_id
  company_domain_fallback:
    canonical: companies.main.website
    normalize: bare domain
    seen_as:
      people.main: org_domain
      people.career: org_domain
      companies.jobs: domain
      companies.news: domain
      web.links:
      - source_domain
      - target_domain
      web.pages: domain
  company_linkedin_fallback:
    canonical: companies.jobs.linkedin_id
    seen_as:
      companies.news: linkedin_id
files:
  people.main: people.main.yaml
  people.career: people.career.yaml
  people.education: people.education.yaml
  people.contact: people.contact.yaml
  people.repos: people.repos.yaml
  companies.main: companies.main.yaml
  companies.jobs: companies.jobs.yaml
  companies.news: companies.news.yaml
  web.links: web.links.yaml
  web.pages: web.pages.yaml
