version: 1
purpose: bundled public Speaker schema docs
mesh:
  version: 1
  purpose: compact LLM-oriented schema notes for Speaker tables
  conventions:
    string: scalar string; may still be empty unless noted otherwise
    string?: nullable or frequently empty string
    string[]: real JSON array of strings
    float[]: real JSON array of floats
    date: returned as YYYY-MM-DD
    datetime: returned as YYYY-MM-DD HH:MM:SS
    timestamp: returned as YYYY-MM-DD HH:MM:SS.fffffffff
    pipe_string?: string with | delimiter; not an array
  core_hops:
    people.main.speaker_person_id:
    - people.career.person_id
    - people.education.speaker_person_id
    - people.contact.speaker_person_id
    - people.repos.speaker_person_id
    companies.main.entity_id:
    - companies.jobs.entity_id
    - companies.news.entity_id
    - web.links.source_entity_id
    - web.links.target_entity_id
    companies.main.website: normalize to a bare domain before matching companies.jobs.domain,
      companies.news.domain, web.links.source_domain, web.links.target_domain, or
      web.pages.domain
    companies.jobs.linkedin_id: can match companies.news.linkedin_id
tables:
  people.main:
    purpose: canonical person profile snapshot
    grain: 1 row = 1 person
    keys:
      primary: speaker_person_id
      useful:
        entity_id: current org entity id
        org_domain: current org domain
        org_slug: current org slug; can be text or numeric-like
      joins:
        people.education.speaker_person_id: speaker_person_id
        people.contact.speaker_person_id: speaker_person_id
        people.repos.speaker_person_id: speaker_person_id
        people.career.person_id: speaker_person_id
    query_hints:
    - treat this as the current snapshot, not full career history
    - arrays are real JSON arrays
    - country is usually a short country code like us
    columns:
      speaker_person_id: string; canonical person id
      first: string
      last: string
      country: string?; usually a short country code like us
      location: string?
      title: string?; current role title
      org: string?; current org name
      org_slug: string?; current org slug; can be text or numeric-like
      org_domain: string?; current org domain
      entity_id: string?; current org entity id
      seniority: string?; common values ic|manager|c_suite|senior_ic|director|vp
      track: string?; common values individual|manager
      influencer_score: float
      depth: float
      last_updated: date
      technologies: string[]
      domain_knowledge: string[]
      credentials: string[]
      languages: string[]
      highest_degree: string?
      school: string?
  people.career:
    purpose: person role history
    grain: 1 row = 1 person-role entry
    keys:
      useful:
        person_id: same id format as people.main.speaker_person_id
        entity_id: org entity id for this role
        org_domain: org domain for this role
      joins:
        people.main.speaker_person_id: person_id
        companies.main.entity_id: entity_id
    query_hints:
    - multiple rows per person; do not assume current role only
    - start and end are strings, usually YYYY-MM, and can be null
    - roles_context can be long free text
    columns:
      person_id: string; join to people.main.speaker_person_id
      title: string?; role title
      start: string?; usually YYYY-MM
      end: string?; usually YYYY-MM; null if open/current
      org_name: string?; org name for this role
      entity_id: string?; org entity id
      org_domain: string?; org domain
      roles_context: string?; long free-text role or org context
      location: string?
  people.education:
    purpose: education history
    grain: 1 row = 1 education record
    keys:
      useful:
        speaker_person_id: person id
      joins:
        people.main.speaker_person_id: speaker_person_id
    query_hints:
    - start and end are strings, usually YYYY-MM, not Date columns
    - degree and field_of_study can be empty even when school exists
    columns:
      speaker_person_id: string; join to people.main.speaker_person_id
      school: string?
      degree: string?
      degree_level: string?; examples Bachelor|Master|Certificate
      field_of_study: string?
      start: string?; usually YYYY-MM
      end: string?; usually YYYY-MM
  people.contact:
    purpose: person contact bundle
    grain: 1 row = 1 person
    keys:
      primary: speaker_person_id
      joins:
        people.main.speaker_person_id: speaker_person_id
    query_hints:
    - most contact fields are empty on many rows
    - linkedin_slug, twitter, and github are bare handles/slugs, not full URLs
    - website may be a full URL or a bare domain
    columns:
      speaker_person_id: string; join to people.main.speaker_person_id
      linkedin_slug: string?; bare LinkedIn slug
      email_work: string?; work email
      twitter: string?; bare handle, not URL
      github: string?; bare GitHub username, not URL
      website: string?; full URL or bare domain
  people.repos:
    purpose: GitHub repositories linked to people
    grain: 1 row = 1 repo
    keys:
      useful:
        speaker_person_id: person id when present; often blank
        owner: GitHub owner/login
        repo: GitHub repo name
      joins:
        people.main.speaker_person_id: speaker_person_id
    query_hints:
    - speaker_person_id is often blank; do not rely on it
    - owner plus repo identifies the repository
    - created_at is nullable; language and license may be empty
    columns:
      speaker_person_id: string?; person id; often blank
      owner: string; GitHub owner/login
      repo: string; GitHub repo name
      language: string?; primary language
      created_at: datetime?
      description: string?
      description_language: string?; language code like en
      license: string?; SPDX-like value such as mit or cc0-1.0
      forks: int
      stars: int
      size_kb: int
      last_pr_id: int
  companies.main:
    purpose: canonical company profile
    grain: 1 row = 1 company
    keys:
      primary: entity_id
      useful:
        website: company website, usually a bare domain
        name: company name
      joins:
        companies.jobs.entity_id: entity_id
        companies.news.entity_id: entity_id
        web.links.source_entity_id: entity_id
        web.links.target_entity_id: entity_id
    query_hints:
    - keywords, offerings, customer_types, and naics_codes are real JSON arrays
    - website is usually a bare domain, not a full URL
    - embedding is a dense float vector; usually ignore unless doing similarity work
    columns:
      entity_id: string; canonical company id
      name: string
      summary: string?
      keywords: string[]
      offerings: string[]
      market: string?; common values b2b|b2c|b2b2c|b2g
      customer_types: string[]
      naics_codes: string[]; code:label strings
      business_model: string?; common values other|subscription|fees|sales|services|nonprofit|commission|manufacturing|retail|distribution
      headcount: int
      size: string; values solo|micro|small|medium|large|enterprise
      founded: int?; year
      country: string?; usually a short country code like es
      region: string?
      city: string?
      address: string?
      lat: float?
      lng: float?
      website: string?; usually bare domain
      embedding: float[]; dense vector
      reputation: float
      last_updated: date
  companies.jobs:
    purpose: job postings
    grain: 1 row = 1 job posting
    keys:
      likely_unique: url
      useful:
        entity_id: company entity id when present
        linkedin_id: company LinkedIn id when present
        domain: company domain when present
      joins:
        companies.main.entity_id: entity_id
        companies.news.linkedin_id: linkedin_id
    query_hints:
    - description can be very large multi-paragraph text
    - entity_id, domain, and linkedin_id may be blank on valid rows
    - date_added and date_updated are timestamps with nanosecond precision
    columns:
      entity_id: string?; company entity id
      domain: string?; company domain
      company_name: string?
      linkedin_id: string?; company LinkedIn id
      title: string; job title
      url: string?; job posting URL
      openings: int
      category: string?; common values Others|Engineering|Sales|Product|Operations|Consultancy|Marketing|Project
        Management|Design
      description: string?; long free text
      date_added: timestamp
      date_updated: timestamp
      location: string?
  companies.news:
    purpose: company-linked news articles
    grain: 1 row = 1 article
    keys:
      likely_unique: url
      useful:
        entity_id: company entity id when present
        linkedin_id: company LinkedIn id when present
        domain: company domain when present
      joins:
        companies.main.entity_id: entity_id
        companies.jobs.linkedin_id: linkedin_id
    query_hints:
    - entity_id, domain, and linkedin_id may be blank on valid rows
    - published_date can be the placeholder 1970-01-01
    - 'source values seen in live data: google_news and curated'
    columns:
      entity_id: string?; company entity id
      domain: string?; company domain
      linkedin_id: string?; company LinkedIn id
      title: string
      url: string?; article URL
      publisher: string?
      publisher_domain: string?
      published_date: date
      confidence: float
      source: string?; google_news|curated
  web.links:
    purpose: domain-to-domain link graph
    grain: 1 row = 1 source_domain -> target_domain edge
    keys:
      useful:
        source_entity_id: source company entity id when present
        source_domain: source domain
        target_entity_id: target company entity id when present
        target_domain: target domain
    query_hints:
    - page_count is the number of source pages linking to the target domain
    - source_entity_id and target_entity_id may be blank
    - best for graph hops and domain relationship analysis, not page-level content
    columns:
      source_entity_id: string?; source company entity id
      source_domain: string; source domain
      target_domain: string; target domain
      target_entity_id: string?; target company entity id
      page_count: int
  web.pages:
    purpose: crawled pages plus extracted metadata
    grain: 1 row = 1 page URL
    keys:
      likely_unique: url
      useful:
        domain: best filter key; filter by domain before reading large text fields
        url: page URL
      joins:
        web.links.source_domain: domain
        web.links.target_domain: domain
        companies.jobs.domain: domain
        companies.news.domain: domain
    query_hints:
    - always filter by domain before selecting desc or text; this table is huge
    - domain and url may be percent-encoded for IDNs
    - several extracted metadata fields are pipe-delimited strings, not arrays
    columns:
      domain: string; domain key
      url: string; page URL
      canonical: string?
      page_type: string?; common values other|content|product|homepage|newsroom|event|identity|careers|legal|docs
      title: string?
      lang: string?; usually short code like ru or es
      lang_score: float?
      country: string?; usually short country code
      desc: string?; description text
      text: string?; full page text; can be very large
      word_count: int
      emails: string?; extracted email(s)
      phones: string?; extracted phone(s)
      socials: pipe_string?; extracted social URLs
      outlinks: pipe_string?; outbound URLs
      headings: pipe_string?; heading list, often level-prefixed like 1:Title|2:Section
      nav: pipe_string?; navigation labels
      tools: pipe_string?; detected tech stack/plugins
      tag_ids: pipe_string?; extracted tag or analytics ids
      site_name: string?
      content_type: string?; common values article|website|product|profile; often
        empty
      twitter_site: string?
      twitter_creator: string?
      og_locale: string?
      org_type: string?; e.g. Organization
      org_name: string?
      org_phone: string?
      org_email: string?
      org_socials: pipe_string?; org social URLs
      address: string?
      postcode: string?
      org_country: string?
      lat: float?
      lng: float?
      founded: string?; extracted year/date text, not normalized
      employees: string?; extracted size text, not normalized
      rating: float?
      reviews: int
      keywords: string?; keyword text, not an array
      hreflang_count: int
      crawled_at: string?; crawl timestamp text
      server: string?
      powered_by: string?
      server_ip: string?
      response_ms: int
