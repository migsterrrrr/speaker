table: companies.competitors
purpose: "company competitor domains and source flags"
grain: "1 row = 1 company-competitor domain edge"
estimated_rows: "59.36 million"
row_count: 59360439
row_identity: "entity_id, competitor_domain"
graph_keys:
  entity_id: "Speaker company/entity id."
  competitor_domain: "Competitor/root domain; can resolve through web.domain_entity_bridge."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "entity_id, competitor_domain"
  primary_key: "entity_id, competitor_domain"
  partition_by: null
  fast_where:
    - where: "entity_id = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "entity_id = ... AND competitor_domain = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "competitor_domain = ... without entity_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
