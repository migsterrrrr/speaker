table: companies.identifiers
purpose: "company websites, social/profile URLs, and external handles"
grain: "1 row = 1 company/entity"
estimated_rows: "26.32 million"
row_count: 26323167
row_identity: "entity_id"
graph_keys:
  entity_id: "Speaker company/entity id."
  website_domain: "Normalized website/domain fallback; hop to web pages and domain bridge."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "entity_id"
  primary_key: "entity_id"
  partition_by: "cityHash64(entity_id) % 64"
  fast_where:
    - where: "entity_id = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "entity_id IN (...)"
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "website_domain = ... without entity_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
traverse:
  entity_id:
    - companies.nucleus.entity_id
    - companies.metrics.entity_id
    - companies.jobs.entity_id
    - people.nucleus.current_company_id
  website_domain:
    - web.pages.domain
    - web.domain_entity_bridge.domain
query_notes:
  - "Use entity_id when possible."
  - "website_domain is a useful graph/domain fallback but not the ORDER BY prefix."
