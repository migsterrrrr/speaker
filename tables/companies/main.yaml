table: companies.nucleus
purpose: "canonical company profile snapshot"
grain: "1 row = 1 company/entity"
estimated_rows: "26.32 million"
row_count: 26323167
row_identity: "entity_id"
graph_keys:
  entity_id: "Speaker company/entity id; canonical across companies.* and web entity fields."
  website: "Company website/domain fallback when entity_id is unknown."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "entity_id"
  primary_key: "entity_id"
  partition_by: null
  fast_where:
    - where: "entity_id = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "entity_id IN (...)"
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "website/name/summary filters without entity_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
traverse:
  entity_id:
    - companies.identifiers.entity_id
    - companies.metrics.entity_id
    - companies.jobs.entity_id
    - companies.posts.entity_id
    - companies.competitors.entity_id
    - companies.funding_rounds.entity_id
    - people.nucleus.current_company_id
    - people.roles_history.speaker_company_id
    - web.pages.entity_id
  website:
    - web.pages.domain
    - web.domain_entity_bridge.domain
query_notes:
  - "Use entity_id as the company/entity graph key."
  - "Use website/domain as fallback when entity_id is unknown."
  - "The physical access path is entity_id; broad text search over summary can timeout."
