table: companies.posts
purpose: "news/article mentions associated with companies"
grain: "1 row = 1 post/article mention"
estimated_rows: "22.78 million"
row_count: 22777314
row_identity: "post_id"
graph_keys:
  entity_id: "Speaker company/entity id."
  post_id: "Speaker post/article id."
  publisher_domain: "Publisher domain."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "entity_id, post_id"
  primary_key: "entity_id, post_id"
  partition_by: null
  fast_where:
    - where: "entity_id = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "entity_id = ... AND post_id = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "post_id = ... without entity_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
    - where: "publisher_domain/title filters without entity_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
traverse:
  entity_id:
    - companies.nucleus.entity_id
    - companies.identifiers.entity_id
    - companies.metrics.entity_id
  publisher_domain:
    - web.pages.domain
query_notes:
  - "These are article/news-like posts, not social posts."
  - "Fetch posts for known companies by entity_id."
