table: people.nucleus
purpose: "canonical person profile snapshot"
grain: "1 row = 1 person"
estimated_rows: "825.41 million"
row_count: 825412717
row_identity: "person_id"
graph_keys:
  person_id: "Speaker person id; canonical across people.* tables."
  current_company_id: "Speaker company/entity id for the current company; hop to companies.nucleus.entity_id."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "person_id"
  primary_key: "person_id"
  partition_by: "cityHash64(person_id) % 64"
  fast_where:
    - where: "person_id = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "person_id IN (...)"
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "current_company_id = ... without a person_id predicate"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
    - where: "professional_title/professional_title_family scans without person_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
traverse:
  person_id:
    - people.contacts.person_id
    - people.roles_history.person_id
    - people.education.person_id
    - people.repos.person_id
  current_company_id:
    - companies.nucleus.entity_id
    - companies.identifiers.entity_id
    - companies.metrics.entity_id
    - companies.jobs.entity_id
    - companies.posts.entity_id
query_notes:
  - "Use person_id to hop to other people tables."
  - "Use current_company_id as the company/entity id hop into companies.*."
  - "The physical access path is person_id; company/title/country filters are graph-useful but not ORDER BY-prefix fast."
