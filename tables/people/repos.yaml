table: people.repos
purpose: "GitHub repositories with optional person link"
grain: "1 row = 1 GitHub repository"
estimated_rows: "40.06 million"
row_count: 40061390
row_identity: "owner, repo"
graph_keys:
  person_id: "Speaker person id when the repo owner resolves to a person."
  owner: "GitHub owner/login."
  repo: "GitHub repository name."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "owner, repo"
  primary_key: "owner, repo"
  partition_by: null
  fast_where:
    - where: "owner = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "owner = ... AND repo = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "person_id = ... without owner/repo"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
traverse:
  person_id:
    - people.nucleus.person_id
    - people.contacts.person_id
    - people.roles_history.person_id
query_notes:
  - "person_id is present only when the repo owner resolves to a person."
  - "The physical access path is owner, repo; person_id is a graph key but not the ORDER BY prefix."
