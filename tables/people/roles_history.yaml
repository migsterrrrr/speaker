table: people.roles_history
purpose: "append-style person role history"
grain: "1 row = 1 person-role"
estimated_rows: "989.38 million"
row_count: 989378504
row_identity: "speaker_role_id"
graph_keys:
  person_id: "Speaker person id; hop across people.* tables."
  speaker_company_id: "Speaker company/entity id for this role; hop to companies.nucleus.entity_id."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "person_id, ifNull(start_date, toDate32('1900-01-01')), ifNull(end_date, toDate32('2299-12-31')), speaker_company_id, speaker_role_id"
  primary_key: "person_id, ifNull(start_date, toDate32('1900-01-01')), ifNull(end_date, toDate32('2299-12-31')), speaker_company_id, speaker_role_id"
  partition_by: "cityHash64(person_id) % 64"
  fast_where:
    - where: "person_id = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "person_id IN (...)"
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "person_id = ... AND start_date/end_date range predicates"
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "speaker_company_id = ... without person_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
    - where: "current_status/title filters without person_id"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
traverse:
  person_id:
    - people.nucleus.person_id
    - people.contacts.person_id
    - people.education.person_id
  speaker_company_id:
    - companies.nucleus.entity_id
    - companies.identifiers.entity_id
    - companies.metrics.entity_id
query_notes:
  - "Use person_id when possible; company-only searches can scan a large fraction of the table."
  - "speaker_company_id is the company/entity id for the role."
  - "current_status marks current/past role status when known."
