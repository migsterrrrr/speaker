table: web.pages
purpose: "crawled web pages and extracted metadata"
grain: "1 row = 1 page URL"
estimated_rows: "1.32 billion"
row_count: 1322459371
row_identity: "url"
graph_keys:
  domain: "Normalized domain key."
  entity_id: "Speaker company/entity id when the page domain resolves uniquely."
clickhouse_access:
  note: "Public table may be a view; physical access describes the backing ClickHouse MergeTree layout. ClickHouse primary keys are sparse indexes, not uniqueness constraints."
  order_by: "domain"
  primary_key: "domain"
  partition_by: null
  fast_where:
    - where: "domain = ..."
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
    - where: "domain IN (...)"
      why: "matches ORDER BY left prefix; enables MergeTree sparse-index pruning"
  not_fast_by_sort_key:
    - where: "lower(text) LIKE ... without domain"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
    - where: "entity_id = ... without domain"
      why: "does not match the ORDER BY left prefix; expect a broader scan"
  reminder: "There is one physical ORDER BY. fast_where entries are prefix-friendly WHERE shapes, not separate secondary indexes."
traverse:
  domain:
    - web.domain_entity_bridge.domain
    - companies.nucleus.website
    - companies.identifiers.website_domain
  entity_id:
    - companies.nucleus.entity_id
    - companies.metrics.entity_id
query_notes:
  - "Always filter by domain or a small domain IN list before reading text."
  - "Avoid broad lower(text) LIKE scans; they will timeout."
  - "entity_id is filled only when the page domain resolves uniquely."
